<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ name }} | XMind2Cases Preview</title>
    <link rel="shortcut icon" href="{{ url_for('static',filename='favicon.ico') }}" type="image/x-icon"/>
    <!-- 保留 Pure.css 直到迁移完成 -->
    <link rel="stylesheet" type="text/css" media="all" href="{{ url_for('static',filename='css/pure-min.css') }}">
    <link rel="stylesheet" type="text/css" media="all" href="{{ url_for('static',filename='css/custom.css') }}">
    <!-- 添加 Tailwind CSS -->
    <!-- TODO: Consider using local version for production to avoid external CDN dependency -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/preview.css') }}">
</head>
<body class="bg-slate-50 font-sans text-slate-600">
    <!-- 顶部操作栏 -->
    <div class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div class="flex items-center space-x-4">
                    <a href="{{ url_for('index') }}" class="text-slate-600 hover:text-slate-900">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                    </a>
                    <div>
                        <h1 class="text-lg font-semibold text-slate-900">{{ name }}</h1>
                        <p class="text-sm text-slate-500">预览</p>
                    </div>
                </div>

                <div class="flex items-center space-x-3">
                    <!-- 统计信息 -->
                    <div class="hidden sm:flex items-center space-x-4 mr-4">
                        <div class="text-center">
                            <div class="text-2xl font-bold text-indigo-600">{{ suite_count }}</div>
                            <div class="text-xs text-slate-500">TestSuites</div>
                        </div>
                        <div class="h-8 w-px bg-slate-200"></div>
                        <div class="text-center">
                            <div class="text-2xl font-bold text-indigo-600">{{ suite | length }}</div>
                            <div class="text-xs text-slate-500">TestCases</div>
                        </div>
                    </div>

                    <!-- 偏好选择器 -->
                    <div class="preference-selector" id="preference-selector">
                        <label class="text-sm text-slate-500">偏好:</label>
                        <select class="text-sm"></select>
                    </div>

                    <!-- 导出按钮 -->
                    <div class="flex flex-wrap items-center gap-2">
                        <button type="button" class="export-btn inline-flex items-center px-3 sm:px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium transition-colors text-sm sm:text-base" data-type="csv">
                            <svg class="w-4 h-4 mr-1 sm:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                            </svg>
                            <span class="hidden sm:inline">导出</span> CSV
                        </button>
                        <button type="button" class="export-btn inline-flex items-center px-3 sm:px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors text-sm sm:text-base" data-type="xml">
                            <svg class="w-4 h-4 mr-1 sm:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                            </svg>
                            <span class="hidden sm:inline">导出</span> XML
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 主内容区域 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <!-- 由 JS 动态渲染 -->
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-slate-200">
                        <!-- 由 JS 动态渲染 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="mt-12 text-center text-sm text-slate-400 pb-8">
        <a href="{{ url_for('static', filename='guide/index.html') }}" target="_blank" class="hover:text-slate-600">使用指南</a>
        <span class="mx-2">|</span>
        <a href="https://github.com/koco-co/xmind2cases/issues/new" target="_blank" class="hover:text-slate-600">反馈问题</a>
        <span class="mx-2">|</span>
        Powered by <a href="https://github.com/koco-co/xmind2cases" target="_blank" class="hover:text-slate-600">XMind2Cases</a>
    </footer>
    <script>
      // 传递数据给 JS
      window.TESTCASES = {{ suite | tojson }};
      document.body.dataset.filename = "{{ name }}";
    </script>
    <script src="{{ url_for('static', filename='js/preview.js') }}"></script>
</body>
</html>
